<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trinity — Mission Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ui/static/styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    /* Tailwind config: mirror CSS variables so utilities like
       bg-bg-2, text-fg-dim, border-border, text-info, text-ok, etc. resolve. */
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg:       'var(--bg)',
            'bg-1':   'var(--bg-1)',
            'bg-2':   'var(--bg-2)',
            'bg-3':   'var(--bg-3)',
            fg:       'var(--fg)',
            'fg-dim': 'var(--fg-dim)',
            'fg-muted': 'var(--fg-muted)',
            border:   'var(--border)',
            accent:   'var(--accent)',
            'accent-2': 'var(--accent-2)',
            ok:       'var(--ok)',
            info:     'var(--info)',
            critic:   'var(--critic)',
            executor: 'var(--executor)',
            error:    'var(--error)',
          },
          fontFamily: {
            mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Consolas', 'monospace'],
          },
        },
      },
    };
  </script>
</head>
<body>
  <!--
    Grid layout (3 columns × 3 rows):
      [topbar   |  topbar   | topbar   ]   (44px)
      [workspace|  bridge   | diagnostics]  (1fr)
      [workspace| composer  | diagnostics]  (180px)
  -->
  <div id="app" class="app-shell">
    <header id="topbar">
      <button id="btn-sidebar-toggle" class="icon-btn" title="Toggle workspace panel">☰</button>
      <span class="logo">⬢ Trinity</span>
      <div class="agent-toolbar">
        <button type="button" class="agent-btn active status-ready" data-agent="planner">
          <span class="status-dot"></span>Planner
        </button>
        <button type="button" class="agent-btn status-ready" data-agent="critic">
          <span class="status-dot"></span>Critic
        </button>
        <button type="button" class="agent-btn status-ready" data-agent="executor">
          <span class="status-dot"></span>Executor
        </button>
      </div>
      <div class="topbar-meta">
        <div id="tool-status" class="tool-status-pill idle">Tool lifecycle: idle</div>
        <div id="hardware-link-status" class="hardware-pill offline">Hardware Link · offline</div>
        <button id="btn-settings" class="icon-btn settings-btn" title="Settings" aria-label="Open settings">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          Settings
        </button>
      </div>
    </header>

    <main id="main-panel">
      <div id="tool-status-panel" class="tool-status-panel">
        <div class="tool-status-title">Executor state</div>
        <div id="tool-status-content" class="tool-status-content">Waiting for the next tool action…</div>
      </div>
      <div id="chat-container" class="chat-container log-panel bg-[#0f0f0f] text-[#ececec]">
        <div class="log-header">Agent stream</div>
      </div>
    </main>

    <div id="composer-panel" class="composer-panel">
      <form id="chat-form" class="composer-form" autocomplete="off">
        <div class="composer-input-wrapper">
          <textarea id="chat-input"
                    rows="1"
                    placeholder="Ask Trinity…"
                    class="composer-input"></textarea>
          <button id="send-btn" type="submit" class="send-icon" aria-label="Send message">➜</button>
        </div>
      </form>
    </div>
  </div>

  <aside id="col-workspace" class="glass-panel sidebar-panel closed">
    <div class="sidebar-header">
      <span class="sidebar-title">Workspace</span>
      <button id="btn-refresh-tree" class="icon-btn" title="Refresh tree">↻</button>
    </div>
    <div id="workspace-tree" class="tree text-fg"></div>
    <div id="workspace-status" class="text-xs muted mt-2">idle</div>
  </aside>

  <aside id="col-diagnostics" class="glass-panel diag-panel">
    <div class="sidebar-header">
      <span class="sidebar-title">Diagnostics</span>
      <span id="diagnostics-status" class="status-pill offline">offline</span>
    </div>
    <div id="hardware-link-card" class="hardware-card">
      <div class="hardware-head">
        <span class="hardware-title">Hardware Link</span>
        <span id="hardware-link-pill" class="status-pill offline">offline</span>
      </div>
      <div id="hardware-link-detail" class="hardware-detail">Awaiting ESP32 connection…</div>
    </div>
    <div id="diagnostics-list" class="diag-list">
      <div class="diag-note">Diagnostics stream is ready.</div>
    </div>
  </aside>

  <!-- ── Settings modal ─────────────────────────────────────── -->
  <div id="settings-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div class="modal settings-modal-card">

      <div class="modal-header">
        <div class="modal-title-group">
          <svg class="modal-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <h2 id="settings-title">Settings</h2>
        </div>
        <button class="modal-close-btn" data-close aria-label="Close settings">×</button>
      </div>

      <form id="settings-form" autocomplete="off">

        <!-- Provider selector -->
        <div class="settings-section">
          <div class="settings-section-label">LLM Provider</div>
          <div class="provider-tabs" role="group" aria-label="LLM provider">
            <button type="button" class="provider-tab" data-provider="ollama">Ollama</button>
            <button type="button" class="provider-tab" data-provider="nvidia">NVIDIA NIM</button>
            <button type="button" class="provider-tab" data-provider="custom">Custom / OpenAI</button>
          </div>
          <input type="hidden" name="llm_provider" id="llm-provider-input" value="ollama">
        </div>

        <!-- Ollama panel -->
        <div class="provider-panel" id="panel-ollama">
          <div class="settings-field">
            <label for="ollama-url-input">Ollama Base URL</label>
            <input id="ollama-url-input" name="ollama_url" type="text" placeholder="http://localhost:11434" autocomplete="off">
          </div>
          <div class="settings-field">
            <label for="executor-model-input">Executor model</label>
            <input id="executor-model-input" name="executor_model" type="text" placeholder="qwen2.5-coder">
          </div>
        </div>

        <!-- NVIDIA / Custom panel -->
        <div class="provider-panel hidden" id="panel-nvidia">
          <div class="settings-field">
            <label for="api-key-input">
              API Key
              <span class="field-hint">stored in localStorage only</span>
            </label>
            <div class="input-with-eye">
              <input id="api-key-input" name="planner_api_key" type="password" placeholder="nvapi-…" autocomplete="new-password">
              <button type="button" class="eye-btn" id="toggle-key-visibility" aria-label="Show/hide key">
                <svg id="eye-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="settings-row">
            <div class="settings-field">
              <label for="base-url-input">Base URL</label>
              <input id="base-url-input" name="planner_base_url" type="text" placeholder="https://integrate.api.nvidia.com/v1">
            </div>
            <div class="settings-field">
              <label for="planner-model-input">Model</label>
              <input id="planner-model-input" name="planner_model" type="text" placeholder="meta/llama-3.1-70b-instruct">
            </div>
          </div>
          <div class="settings-field">
            <label for="critic-api-key-input">Critic API Key <span class="field-hint">optional, uses Planner key if empty</span></label>
            <input id="critic-api-key-input" name="critic_api_key" type="password" placeholder="nvapi-…" autocomplete="new-password">
          </div>
          <div class="settings-row">
            <div class="settings-field">
              <label for="critic-base-url-input">Critic Base URL</label>
              <input id="critic-base-url-input" name="critic_base_url" type="text" placeholder="https://integrate.api.nvidia.com/v1">
            </div>
            <div class="settings-field">
              <label for="critic-model-input">Critic Model</label>
              <input id="critic-model-input" name="critic_model" type="text" placeholder="google/gemma-2-27b-it">
            </div>
          </div>
        </div>

        <!-- Status + actions -->
        <div id="settings-status" class="settings-status"></div>

        <div class="modal-actions">
          <button type="button" class="btn-ghost" data-close>Cancel</button>
          <button type="submit" class="btn-primary">Save &amp; Apply</button>
        </div>

      </form>
    </div>
  </div>

  <script src="/ui/static/app.js" type="module"></script>
</body>
</html>

[pytest]
# pytest-asyncio 1.x: auto-режим позволяет писать `async def test_…`
# без `@pytest.mark.asyncio` на каждом тесте. Для sync-тестов ничего
# не меняется.
asyncio_mode = auto

# По умолчанию собираем тесты и в корне tests/, и в tests/e2e/.
# Существующий tests/test_endpoint_url.py — обычный pytest;
# E2E — async-тесты под pytest-asyncio.
testpaths = .

<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trinity — Mission Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ui/static/styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    /* Tailwind config: mirror CSS variables so utilities like
       bg-bg-2, text-fg-dim, border-border, text-info, text-ok, etc. resolve. */
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg:       'var(--bg)',
            'bg-1':   'var(--bg-1)',
            'bg-2':   'var(--bg-2)',
            'bg-3':   'var(--bg-3)',
            fg:       'var(--fg)',
            'fg-dim': 'var(--fg-dim)',
            'fg-muted': 'var(--fg-muted)',
            border:   'var(--border)',
            accent:   'var(--accent)',
            'accent-2': 'var(--accent-2)',
            ok:       'var(--ok)',
            info:     'var(--info)',
            critic:   'var(--critic)',
            executor: 'var(--executor)',
            error:    'var(--error)',
          },
          fontFamily: {
            mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Consolas', 'monospace'],
          },
        },
      },
    };
  </script>
</head>
<body>
  <!--
    Grid layout (3 columns × 3 rows):
      [topbar   |  topbar   | topbar   ]   (44px)
      [workspace|  bridge   | diagnostics]  (1fr)
      [workspace| composer  | diagnostics]  (180px)
  -->
  <div id="app" class="app-shell">
    <header id="topbar">
      <button id="btn-sidebar-toggle" class="icon-btn" title="Toggle workspace panel">☰</button>
      <span class="logo">⬢ Trinity</span>
      <div class="agent-toolbar">
        <button type="button" class="agent-btn active status-ready" data-agent="all" data-strategy="auto" title="All agents room">
          <span class="status-dot"></span>All
        </button>
        <button type="button" class="agent-btn status-ready" data-agent="planner" data-strategy="planner" title="Planner only — plan without executing">
          <span class="status-dot"></span>Planner
        </button>
        <button type="button" class="agent-btn status-ready" data-agent="critic" data-strategy="auto" title="Auto — full pipeline: Plan → Review → Execute">
          <span class="status-dot"></span>Critic
        </button>
        <button type="button" class="agent-btn status-ready" data-agent="executor" data-strategy="direct" title="Direct — skip planning, run Executor immediately">
          <span class="status-dot"></span>Executor
        </button>
      </div>
      <div id="strategy-badge" class="strategy-badge" title="Active routing strategy">
        <span id="strategy-badge-icon">🧠</span>
        <span id="strategy-badge-label">planner</span>
      </div>
      <div class="topbar-meta">
        <div id="tool-status" class="tool-status-pill idle">Tool lifecycle: idle</div>
        <div id="hardware-link-status" class="hardware-pill offline">Hardware Link · offline</div>
        <button id="btn-settings" class="icon-btn settings-btn" title="Settings" aria-label="Open settings">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          Settings
        </button>
      </div>
    </header>

    <main id="main-panel">
      <div id="tool-status-panel" class="tool-status-panel">
        <div class="tool-status-title">Executor state</div>
        <div id="tool-status-content" class="tool-status-content">Waiting for the next tool action…</div>
      </div>
      <div id="chat-container" class="chat-container log-panel bg-[#0f0f0f] text-[#ececec]">
        <div class="log-header">Agent stream</div>
      </div>
      <div id="executor-skeleton" class="executor-skeleton hidden">
        <div class="skeleton-header">
          <span class="skeleton-agent-tag">executor</span>
          <span class="skeleton-label">working…</span>
          <div class="skeleton-spinner"></div>
        </div>
        <div class="skeleton-lines">
          <div class="skeleton-line" style="width:85%"></div>
          <div class="skeleton-line" style="width:62%"></div>
          <div class="skeleton-line" style="width:74%"></div>
        </div>
      </div>
    </main>

    <div id="composer-panel" class="composer-panel">
      <form id="chat-form" class="composer-form" autocomplete="off">
        <div class="composer-input-wrapper">
          <textarea id="chat-input"
                    rows="1"
                    placeholder="Ask Trinity…"
                    class="composer-input"></textarea>
          <button id="send-btn" type="submit" class="send-icon" aria-label="Send message">➜</button>
          <button id="stop-btn" type="button" class="stop-btn hidden" aria-label="Stop generation" title="Stop">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
          </button>
        </div>
      </form>
    </div>
  </div>

  <aside id="col-workspace" class="glass-panel sidebar-panel closed">
    <div class="sidebar-header">
      <span class="sidebar-title">Workspace</span>
      <button id="btn-refresh-tree" class="icon-btn" title="Refresh tree">↻</button>
    </div>
    <div id="workspace-tree" class="tree text-fg"></div>
    <div id="workspace-status" class="text-xs muted mt-2">idle</div>
  </aside>


  <!-- ── Settings modal ─────────────────────────────────────── -->
  <div id="settings-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div class="modal settings-modal-card">

      <div class="modal-header">
        <div class="modal-title-group">
          <svg class="modal-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <h2 id="settings-title">Settings</h2>
        </div>
        <button class="modal-close-btn" data-close aria-label="Close settings">×</button>
      </div>

      <form id="settings-form" autocomplete="off">

        <div class="agents-config-container">
          <!-- PLANNER -->
          <div class="agent-config-block" id="config-planner" data-agent="planner">
            <div class="agent-header">
              <h3>[ PLANNER ]</h3>
              <div class="type-toggle">
                <label class="radio-label"><input type="radio" name="planner_type" value="base" checked> Base</label>
                <label class="radio-label"><input type="radio" name="planner_type" value="custom"> Custom</label>
              </div>
            </div>
            
            <div class="agent-panel base-panel">
              <div class="settings-field">
                <label>Provider</label>
                <select name="planner_base_provider" class="cyber-select">
                  <option value="gpt">GPT (OpenAI)</option>
                  <option value="anthropic">Anthropic</option>
                  <option value="google">Google</option>
                </select>
              </div>
              <div class="settings-field api-key-field">
                <label>API Key</label>
                <div class="api-keys-container">
                  <input type="password" name="planner_base_api_key" placeholder="sk-..." class="cyber-input api-key-input" autocomplete="new-password">
                </div>
              </div>
            </div>

            <div class="agent-panel custom-panel hidden">
              <div class="settings-field">
                <label>Provider</label>
                <select name="planner_custom_provider" class="cyber-select">
                  <option value="nvidia">NVIDIA NIM</option>
                  <option value="ollama">Ollama</option>
                  <option value="google">Google Gemini</option>
                </select>
              </div>
              <div class="settings-field api-key-field">
                <label>API Key</label>
                <div class="api-keys-container">
                  <input type="password" name="planner_custom_api_key" placeholder="nvapi-..." class="cyber-input api-key-input" autocomplete="new-password">
                </div>
              </div>
              <div class="settings-row">
                <div class="settings-field">
                  <label>Base URL</label>
                  <input type="text" name="planner_base_url" placeholder="https://..." class="cyber-input">
                </div>
                <div class="settings-field">
                  <label>Model Name</label>
                  <input type="text" name="planner_model_name" placeholder="model-id" class="cyber-input">
                </div>
              </div>
            </div>
          </div>

          <!-- EXECUTOR -->
          <div class="agent-config-block" id="config-executor" data-agent="executor">
            <div class="agent-header">
              <h3>[ EXECUTOR ]</h3>
              <div class="type-toggle">
                <label class="radio-label"><input type="radio" name="executor_type" value="base"> Base</label>
                <label class="radio-label"><input type="radio" name="executor_type" value="custom" checked> Custom</label>
              </div>
            </div>
            
            <div class="agent-panel base-panel hidden">
              <div class="settings-field">
                <label>Provider</label>
                <select name="executor_base_provider" class="cyber-select">
                  <option value="gpt">GPT (OpenAI)</option>
                  <option value="anthropic">Anthropic</option>
                  <option value="google">Google</option>
                </select>
              </div>
              <div class="settings-field api-key-field">
                <label>API Key</label>
                <div class="api-keys-container">
                  <input type="password" name="executor_base_api_key" placeholder="sk-..." class="cyber-input api-key-input" autocomplete="new-password">
                </div>
              </div>
            </div>

            <div class="agent-panel custom-panel">
              <div class="settings-field">
                <label>Provider</label>
                <select name="executor_custom_provider" class="cyber-select">
                  <option value="ollama">Ollama</option>
                  <option value="nvidia">NVIDIA NIM</option>
                  <option value="google">Google Gemini</option>
                </select>
              </div>
              <div class="settings-field api-key-field">
                <label>API Key</label>
                <div class="api-keys-container">
                  <input type="password" name="executor_custom_api_key" placeholder="Optional for Ollama" class="cyber-input api-key-input" autocomplete="new-password">
                </div>
              </div>
              <div class="settings-row">
                <div class="settings-field">
                  <label>Base URL</label>
                  <input type="text" name="executor_base_url" placeholder="http://localhost:11434" class="cyber-input">
                </div>
                <div class="settings-field">
                  <label>Model Name</label>
                  <input type="text" name="executor_model_name" placeholder="qwen2.5-coder" class="cyber-input">
                </div>
              </div>
            </div>
          </div>

          <!-- CRITIC -->
          <div class="agent-config-block" id="config-critic" data-agent="critic">
            <div class="agent-header">
              <h3>[ CRITIC ]</h3>
              <div class="type-toggle">
                <label class="radio-label"><input type="radio" name="critic_type" value="base" checked> Base</label>
                <label class="radio-label"><input type="radio" name="critic_type" value="custom"> Custom</label>
              </div>
            </div>
            
            <div class="agent-panel base-panel">
              <div class="settings-field">
                <label>Provider</label>
                <select name="critic_base_provider" class="cyber-select">
                  <option value="anthropic">Anthropic</option>
                  <option value="gpt">GPT (OpenAI)</option>
                  <option value="google">Google</option>
                </select>
              </div>
              <div class="settings-field api-key-field">
                <label>API Key</label>
                <div class="api-keys-container">
                  <input type="password" name="critic_base_api_key" placeholder="sk-..." class="cyber-input api-key-input" autocomplete="new-password">
                </div>
              </div>
            </div>

            <div class="agent-panel custom-panel hidden">
              <div class="settings-field">
                <label>Provider</label>
                <select name="critic_custom_provider" class="cyber-select">
                  <option value="nvidia">NVIDIA NIM</option>
                  <option value="ollama">Ollama</option>
                  <option value="google">Google Gemini</option>
                </select>
              </div>
              <div class="settings-field api-key-field">
                <label>API Key</label>
                <div class="api-keys-container">
                  <input type="password" name="critic_custom_api_key" placeholder="nvapi-..." class="cyber-input api-key-input" autocomplete="new-password">
                </div>
              </div>
              <div class="settings-row">
                <div class="settings-field">
                  <label>Base URL</label>
                  <input type="text" name="critic_base_url" placeholder="https://..." class="cyber-input">
                </div>
                <div class="settings-field">
                  <label>Model Name</label>
                  <input type="text" name="critic_model_name" placeholder="model-id" class="cyber-input">
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Status + actions -->
        <div id="settings-status" class="settings-status"></div>

        <div class="modal-actions">
          <button type="button" class="btn-ghost" data-close>Cancel</button>
          <button type="submit" class="btn-primary">Save &amp; Apply</button>
        </div>

      </form>
    </div>
  </div>

  <script src="/ui/static/app.js" type="module"></script>
</body>
</html>
